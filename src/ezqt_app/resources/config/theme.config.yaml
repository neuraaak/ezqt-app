# ///////////////////////////////////////////////////////////////
# PALETTE
# ///////////////////////////////////////////////////////////////
palette:
  # //////
  # Blue-Gray
  blue-gray:
    # //////
    dark:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(22, 26, 32) # fond de page / body wrapper
      surface_base: rgb(27, 31, 39) # surface neutre de référence
      surface_raised: rgb(33, 37, 46) # cards, panels principaux
      surface_overlay: rgb(44, 51, 64) # hover, items sélectionnés
      surface_floating: rgb(52, 59, 74) # dropdowns, tooltips (distingués par shadow)

      # — Bordures
      border_subtle: rgb(54, 61, 76) # séparateur standard

      # — Accent
      accent_brand: "#96CD32" # fond de bouton/badge uniquement

      # — Texte
      text_primary: rgb(218, 220, 228) # texte principal sur surface_raised (contraste ≈7.5:1 ✓ WCAG AAA)
      text_secondary: rgb(122, 134, 158) # texte secondaire sur surface_raised (contraste ≈5.8:1 ✓ WCAG AA)
      text_on_accent: rgb(255, 255, 255) # texte sélectionné

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(33, 37, 46, 0.88)

      # — Sémantiques
      semantic_success: "#4ade80"
      semantic_warning: "#fbbf24"
      semantic_error: "#f87171"
      semantic_info: "#60a5fa"
    # //////
    light:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(228, 232, 240) # fond de page / body wrapper
      surface_base: rgb(240, 243, 249) # surface neutre de référence
      surface_raised: rgb(255, 255, 255) # cards, panels principaux
      surface_overlay: rgb(234, 237, 245) # hover, items sélectionnés
      surface_floating: rgb(255, 255, 255) # dropdowns, tooltips (distingués par shadow)

      # — Bordures
      border_subtle: rgb(210, 215, 228) # séparateur standard

      # — Accent
      accent_brand: "#96CD32" # fond de bouton/badge uniquement

      # — Texte
      text_primary: rgb(28, 32, 40) # texte principal sur surface_raised (contraste ≈7.5:1 ✓ WCAG AAA)
      text_secondary: rgb(90, 100, 122) # texte secondaire sur surface_raised (contraste ≈5.8:1 ✓ WCAG AA)
      text_on_accent: rgb(28, 32, 40) # texte sélectionné

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(28, 32, 40, 0.40)

      # — Sémantiques (assombries pour contraster sur fond clair)
      semantic_success: "#16a34a"
      semantic_warning: "#d97706"
      semantic_error: "#dc2626"
      semantic_info: "#2563eb"

  # //////
  # Github Dark
  github-dark:
    # //////
    dark:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(1, 4, 9) # #010409 — fond de page
      surface_base: rgb(13, 17, 23) # #0d1117 — surface neutre de référence
      surface_raised: rgb(22, 27, 34) # #161b22 — cards, panels principaux
      surface_overlay: rgb(33, 38, 45) # #21262d — hover, items sélectionnés
      surface_floating: rgb(48, 54, 61) # #30363d — dropdowns, tooltips

      # — Bordures
      border_subtle: rgb(48, 54, 61) # #30363d — séparateur standard

      # — Accent
      accent_brand: "#58a6ff" # bleu GitHub — CTA, état actif

      # — Texte
      text_primary: rgb(230, 237, 243) # #e6edf3 — ≈12.5:1 sur surface_raised ✓ WCAG AAA
      text_secondary: rgb(139, 148, 158) # #8b949e — ≈5.1:1 sur surface_raised ✓ WCAG AA
      text_on_accent: rgb(13, 17, 23) # texte sombre sur fond bleu

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(1, 4, 9, 0.88) # voile de modale — cohérent avec surface_sunken

      # — Sémantiques
      semantic_success: "#3fb950" # vert GitHub
      semantic_warning: "#d29922" # ambre GitHub
      semantic_error: "#f85149" # rouge GitHub
      semantic_info: "#58a6ff" # même que accent_brand
    # //////
    light:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(208, 215, 222) # #d0d7de — fond de page
      surface_base: rgb(246, 248, 250) # #f6f8fa — surface neutre de référence
      surface_raised: rgb(255, 255, 255) # #ffffff — cards, panels principaux
      surface_overlay: rgb(234, 238, 242) # #eaeff2 — hover, items sélectionnés
      surface_floating: rgb(255, 255, 255) # #ffffff — dropdowns (distingués par shadow)

      # — Bordures
      border_subtle: rgb(208, 215, 222) # #d0d7de — séparateur standard

      # — Accent
      accent_brand: "#0969da" # bleu GitHub light — plus sombre que le dark

      # — Texte
      text_primary: rgb(31, 35, 40) # #1f2328 — ≈14.5:1 sur surface_raised ✓ WCAG AAA
      text_secondary: rgb(101, 109, 118) # #656d76 — ≈5.4:1 sur surface_raised ✓ WCAG AA
      text_on_accent: rgb(255, 255, 255) # texte blanc sur fond bleu (≠ dark où c'est sombre)

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(31, 35, 40, 0.50) # voile de modale — plus dense qu'un light classique

      # — Sémantiques (assombries pour contraster sur fond clair)
      semantic_success: "#1a7f37" # vert GitHub light
      semantic_warning: "#9a6700" # ambre GitHub light
      semantic_error: "#cf222e" # rouge GitHub light
      semantic_info: "#0969da" # même que accent_brand

  # //////
  # Warm Dark
  warm-dark:
    # //////
    dark:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(16, 12, 10) # fond de page — brun quasi noir
      surface_base: rgb(24, 20, 16) # surface neutre de référence
      surface_raised: rgb(33, 28, 22) # cards, panels principaux
      surface_overlay: rgb(44, 38, 30) # hover, items sélectionnés
      surface_floating: rgb(56, 48, 38) # dropdowns, tooltips

      # — Bordures
      border_subtle: rgb(66, 57, 45) # séparateur standard

      # — Accent
      accent_brand: "#d97706" # ambre chaud — CTA, état actif

      # — Texte
      text_primary: rgb(232, 221, 208) # crème chaud — ≈9.1:1 sur surface_raised ✓ WCAG AAA
      text_secondary: rgb(160, 144, 124) # sable — ≈4.6:1 sur surface_raised ✓ WCAG AA
      text_on_accent: rgb(24, 20, 16) # texte sombre sur fond ambre

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(16, 12, 10, 0.88)

      # — Sémantiques
      semantic_success: "#4ade80"
      semantic_warning: "#fbbf24"
      semantic_error: "#f87171"
      semantic_info: "#7dd3fc"
    # //////
    light:
      # — Surfaces (du plus sombre au plus clair)
      surface_sunken: rgb(218, 210, 196) # fond de page — beige marqué
      surface_base: rgb(238, 232, 220) # surface neutre de référence
      surface_raised: rgb(255, 250, 242) # cards, panels principaux — blanc cassé chaud
      surface_overlay: rgb(230, 223, 210) # hover, items sélectionnés
      surface_floating: rgb(255, 250, 242) # dropdowns (distingués par shadow)

      # — Bordures
      border_subtle: rgb(206, 196, 180) # séparateur standard

      # — Accent
      accent_brand: "#b45309" # ambre foncé — lisible sur fond clair

      # — Texte
      text_primary: rgb(30, 24, 16) # brun très sombre — ≈14.2:1 sur surface_raised ✓ WCAG AAA
      text_secondary: rgb(100, 86, 66) # brun moyen — ≈5.2:1 sur surface_raised ✓ WCAG AA
      text_on_accent: rgb(255, 250, 242) # crème sur fond ambre foncé

      # — Transparences
      transparent: rgba(255, 255, 255, 0)
      overlay_scrim: rgba(30, 24, 16, 0.45)

      # — Sémantiques (assombries pour fond clair)
      semantic_success: "#15803d"
      semantic_warning: "#92400e"
      semantic_error: "#b91c1c"
      semantic_info: "#0369a1"
