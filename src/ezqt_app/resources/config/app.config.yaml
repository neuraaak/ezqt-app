# ///////////////////////////////////////////////////////////////
# APPLICATION
# ///////////////////////////////////////////////////////////////
app:
  # APP
  # //////
  name: MyApplication
  description: This is an example description
  # //////
  app_width: 1280
  app_min_width: 940
  # //////
  app_height: 720
  app_min_height: 560

  # GUI
  # //////
  debug: false
  # Optional logger overrides. If omitted, logs go to ~/.ezqt/logs and
  # the file name is derived from app.name (e.g. myapplication.log).
  logs_dir: "~/.ezqt/logs"
  log_file_name: ""
  # Initial/fallback theme used on first launch or when settings_panel.theme.default
  # is absent. Once the user picks a theme, the persisted value in
  # settings_panel.theme.default takes precedence (see _get_setting_default in app.py).
  theme: "dark"
  menu_panel_shrinked_width: 60
  menu_panel_extended_width: 240
  settings_panel_width: 240
  time_animation: 400

  # Where settings panel values are persisted.
  # Dot-separated path within this file (app.config.yaml) — do NOT include the
  # file name prefix. Example: "settings_panel" resolves to app_config["settings_panel"].
  settings_storage_root: "settings_panel"

  # Config metadata
  # //////
  config_version: 1

# ///////////////////////////////////////////////////////////////
# SETTINGS PANEL
# ///////////////////////////////////////////////////////////////
settings_panel:
  # Settings automatically generated from this configuration
  theme:
    type: "toggle"
    label: "Active Theme"
    options: ["Light", "Dark"]
    # Persisted theme chosen by the user. Overrides app.theme (the initial fallback).
    # Written by AppService.stage_config_value on every theme change and flushed to
    # disk on application quit.
    default: "dark"
    description: "Choose the application theme"
    enabled: true

  language:
    type: "select"
    label: "Language"
    options: ["English", "Français", "Español", "Deutsch"]
    # UI display name of the active language (e.g. "English", "Français").
    # Distinct from language_detection.default_source_language in translation.config.yaml,
    # which is the ISO code used by the translation engine ("en", "fr", …).
    default: "English"
    description: "Interface language"
    enabled: true
  
  notifications:
    type: "checkbox"
    label: "Notifications"
    default: true
    description: "Enable system notifications"
    enabled: false
  
  auto_save:
    type: "checkbox"
    label: "Auto Save"
    default: false
    description: "Automatically save modifications"
    enabled: false
  
  save_interval:
    type: "slider"
    label: "Save Interval"
    min: 1
    max: 60
    default: 5
    unit: "minutes"
    description: "Interval between automatic saves"
    enabled: false

# Configuration des thèmes et palettes dans palette.yaml
